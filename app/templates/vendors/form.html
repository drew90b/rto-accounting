{% extends "base.html" %}
{% block title %}{{ 'Edit Vendor' if vendor else 'Add Vendor' }}{% endblock %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">{% if vendor %}Edit Vendor — {{ vendor.vendor_id }}{% else %}Add Vendor{% endif %}</h1>
  <a href="/vendors/" class="btn btn-secondary">← Back to Vendors</a>
</div>

<div class="card">
  <form method="post" action="{% if vendor %}/vendors/{{ vendor.id }}/edit{% else %}/vendors/new{% endif %}">
    <div class="form-grid">

      <div class="form-group">
        <label>Name *</label>
        <input type="text" name="name" value="{{ vendor.name if vendor else '' }}" required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ vendor.phone or '' if vendor else '' }}" placeholder="(555) 000-0000">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ vendor.email or '' if vendor else '' }}">
      </div>

      <div class="form-group form-full">
        <label>Address</label>
        <textarea name="address">{{ vendor.address or '' if vendor else '' }}</textarea>
      </div>

      <div class="form-group form-full">
        <label>Notes</label>
        <textarea name="notes">{{ vendor.notes or '' if vendor else '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Vendor</button>
        <a href="/vendors/" class="btn btn-secondary">Cancel</a>
      </div>

    </div>
  </form>
</div>

{% endblock %}
